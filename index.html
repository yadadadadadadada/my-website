<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ToDoリスト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ToDoリスト</h1>
        <p>やることを入力して管理できます。</p>

        <div class="input-area">
            <input type="text" id="taskInput" placeholder="タスクを入力">
            <button onclick="addTask()">追加</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
